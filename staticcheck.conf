# staticcheck configuration.
#
# The stylecheck (ST10xx) family is disabled. This module is a mechanical
# extraction from fir and must stay behaviour- and API-identical, so the
# ported code is preserved verbatim:
#
#   - ST1000: files lead with a "// Ported from:" provenance comment
#     rather than a "Package ..." doc comment (doc.go carries the package
#     doc).
#   - ST1003: exported identifiers like GetApiKey keep their original
#     spelling — renaming would break the public API.
#   - ST1005: the edit tool's user-facing error strings (capitalization
#     and trailing punctuation) are part of the extracted behaviour and
#     asserted byte-for-byte by tests.
#   - ST1020/ST1023: ported comment/redundancy style.
#
# All SA* (correctness) checks remain enabled.
checks = ["all", "-ST1000", "-ST1003", "-ST1005", "-ST1020", "-ST1023"]
